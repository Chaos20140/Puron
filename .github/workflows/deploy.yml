name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. Don't cancel an in-flight prod deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Custom domain puron-media.de serves from root, so no GHP_BASE — Vite
      # defaults base to "/" (see vite.config.ts). public/CNAME carries the
      # domain into the artifact so the Pages custom-domain setting survives
      # each Actions deploy. (For the old project-subpage build, this set
      # GHP_BASE: /Puron/.)
      - run: pnpm build

      # Pages must be enabled in the repo Settings (Settings → Pages →
      # Source: "GitHub Actions") before this step works. The GITHUB_TOKEN
      # used by the workflow doesn't have permission to enable Pages itself.
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
