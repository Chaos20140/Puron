name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. Don't cancel an in-flight prod deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # GHP_BASE matches the repo name so asset URLs resolve under the
      # /Puron/ subpath. Switch to "/" once a custom domain is configured.
      - run: pnpm build
        env:
          GHP_BASE: /Puron/

      # Pages must be enabled in the repo Settings (Settings → Pages →
      # Source: "GitHub Actions") before this step works. The GITHUB_TOKEN
      # used by the workflow doesn't have permission to enable Pages itself.
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
