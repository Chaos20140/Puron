
  <!DOCTYPE html>
  <html lang="de" class="dark">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="theme-color" content="#0A0A0D" />

      <!-- Load fonts directly in the head (with preconnect) instead of via a
           CSS @import. The @import created a request waterfall — the browser
           had to fetch the bundled CSS first, discover the @import, then fetch
           Google Fonts. A <link> here is discovered immediately and fetched in
           parallel with the JS. display=swap shows fallback text instantly. -->
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" />

      <title>Puron Media — Social Media Content, das Unternehmen sichtbar macht</title>
      <meta name="description" content="Puron Media aus Meschede produziert Reels, Posts, Ads und Content-Strategien, die Unternehmen Kunden, Bewerber und langfristige Aufmerksamkeit gewinnen lassen." />

      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <link rel="manifest" href="/manifest.webmanifest" />
      <link rel="canonical" href="https://puron-media.de/" />
      <link rel="apple-touch-icon" href="/logo.png" />

      <!-- Open Graph -->
      <meta property="og:type" content="website" />
      <meta property="og:locale" content="de_DE" />
      <meta property="og:url" content="https://puron-media.de/" />
      <meta property="og:site_name" content="Puron Media" />
      <meta property="og:title" content="Puron Media — Social Media Content, das Unternehmen sichtbar macht" />
      <meta property="og:description" content="Reels, Posts, Ads und Content-Strategien, die messbares Wachstum erzeugen." />
      <meta property="og:image" content="https://puron-media.de/logo.png" />
      <meta property="og:image:width" content="256" />
      <meta property="og:image:height" content="256" />
      <meta property="og:image:alt" content="Puron Media – Logo" />

      <!-- Twitter Card -->
      <meta name="twitter:card" content="summary" />
      <meta name="twitter:title" content="Puron Media" />
      <meta name="twitter:description" content="Social Media Content, das Unternehmen sichtbar macht." />
      <meta name="twitter:image" content="https://puron-media.de/logo.png" />

      <!-- Structured data (JSON-LD): local-business / professional-service info
           for richer search results + local SEO. A type="application/ld+json"
           block is data, not executable script, so the strict CSP script-src
           does not apply to it. -->
      <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "ProfessionalService",
          "@id": "https://puron-media.de/#organization",
          "name": "Puron Media",
          "alternateName": "Puron Media Meschede",
          "url": "https://puron-media.de/",
          "logo": "https://puron-media.de/logo.png",
          "image": "https://puron-media.de/logo.png",
          "description": "Social-Media-Agentur aus Meschede: Reels, Posts, Ads und Content-Strategien, die Unternehmen Kunden, Bewerber und langfristige Sichtbarkeit gewinnen lassen.",
          "email": "info@puron-media.de",
          "telephone": "+49 163 8843453",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Birmecker Weg 20",
            "postalCode": "59872",
            "addressLocality": "Meschede",
            "addressRegion": "Nordrhein-Westfalen",
            "addressCountry": "DE"
          },
          "areaServed": { "@type": "Country", "name": "Deutschland" },
          "sameAs": ["https://www.instagram.com/puronmedia"],
          "founder": { "@type": "Person", "name": "Mahsuni Akdemir" },
          "priceRange": "€€"
        }
      </script>

      <style>html, body { height: 100%; margin: 0; background: #0A0A0D; } #root { height: 100%; }</style>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
